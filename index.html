<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <script src="https://www.gstatic.com/firebasejs/8.1.2/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.1.2/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.1.2/firebase-auth.js"></script>
    <script src="fb_setup.js"></script>
    <script src="firebase.js"></script>
    <link rel="stylesheet" href="game.css">
    <title>Game Assessment</title>
</head>

<body>
    <!-- Auth Container -->
    <div id="authContainer">
        <h1>BIRD GAMES</h1>
        
        <!-- Google Sign In Screen -->
        <div id="googleSignInForm">
            <h3>Sign In</h3>
            <button onclick="googleSignIn()">Sign in with Google</button>
        </div>

        <div id="googleRegisterForm">
            <h3>Register</h3>
            <button onclick="googleSignIn()">Register with Google</button>
        </div>

        <!-- Age & Password Form (shown after Google sign in) -->
        <div id="additionalInfoForm" style="display: none;">
            <h3>Complete Your Profile</h3>
            <p id="googleNameDisplay"></p>
            <input type="number" id="playerAge" placeholder="Age" min="1" max="120">
            <input type="password" id="playerPassword" placeholder="Password">
            <button onclick="completeRegistration()">Continue</button>
            <p id="ageWarning" style="color: red; display: none;">You must be over 14 to play!</p>
        </div>
    </div>

    <!-- Main Game Area -->
    <div id="mainContainer" style="display: none;">
        <h1>BIRD GAMES</h1>
        <p id="playerGreeting"></p>
        <button onclick="logout()">Logout</button>
        
        <ul>
            <li><a href="bird catch fish/bird.html">Bird catch fish</a></li>
            <li><a href="climb/climb.html">summit rush</a></li>
            <li><a href="game3/game3.html">in development</a></li>
        </ul>
    </div>

</body>

</html>
